name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin --bundles dmg'
            target: 'aarch64-apple-darwin'
            backend_name: 'twopixel-backend-aarch64-apple-darwin'
            artifact_glob: 'dashboard/src-tauri/target/release/bundle/dmg/*.dmg'
            artifact_name: 'twopixel-macos-dmg'
          - platform: 'windows-latest'
            args: '--bundles nsis'
            target: 'x86_64-pc-windows-msvc'
            backend_name: 'twopixel-backend-x86_64-pc-windows-msvc.exe'
            artifact_glob: 'dashboard/src-tauri/target/release/bundle/nsis/*.exe'
            artifact_name: 'twopixel-windows-nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin

      - name: Build Python Backend
        run: |
          uv venv
          uv pip install pyinstaller pip setuptools wheel
          mkdir -p data
          test -f data/.gitkeep || touch data/.gitkeep
          python - <<'PY'
          from pathlib import Path
          src = Path("requirements.txt").read_text(encoding="utf-8").splitlines()
          skip_prefixes = (
            "faiss-cpu",
            "xinference-client",
          )
          filtered = []
          for line in src:
            raw = line.strip()
            if not raw or raw.startswith("#"):
              filtered.append(line)
              continue
            if raw.startswith(skip_prefixes):
              continue
            filtered.append(line)
          Path("requirements.ci.txt").write_text("\n".join(filtered) + "\n", encoding="utf-8")
          PY
          uv pip install -r requirements.ci.txt
          uv run pyinstaller twopixel_backend.spec
        shell: bash

      - name: Copy Backend to Tauri bin
        run: |
          mkdir -p dashboard/src-tauri/bin
          cp dist/twopixel-backend* dashboard/src-tauri/bin/${{ matrix.backend_name }}
        shell: bash

      - name: Install Frontend Dependencies
        working-directory: ./dashboard
        run: pnpm install

      - name: Build Tauri App
        working-directory: ./dashboard
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload Desktop Installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
