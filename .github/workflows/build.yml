name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            backend_name: 'twopixel-backend-aarch64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'
            backend_name: 'twopixel-backend-x86_64-pc-windows-msvc.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin

      - name: Build Python Backend
        run: |
          uv venv
          uv pip install pyinstaller
          python - <<'PY'
          from pathlib import Path
          src = Path("requirements.txt").read_text(encoding="utf-8").splitlines()
          skip_prefixes = (
            "faiss-cpu",
            "xinference-client",
          )
          filtered = []
          for line in src:
            raw = line.strip()
            if not raw or raw.startswith("#"):
              filtered.append(line)
              continue
            if raw.startswith(skip_prefixes):
              continue
            filtered.append(line)
          Path("requirements.ci.txt").write_text("\n".join(filtered) + "\n", encoding="utf-8")
          PY
          uv pip install -r requirements.ci.txt
          uv run pyinstaller twopixel_backend.spec
        shell: bash

      - name: Copy Backend to Tauri bin
        run: |
          mkdir -p dashboard/src-tauri/bin
          cp dist/twopixel-backend* dashboard/src-tauri/bin/${{ matrix.backend_name }}
        shell: bash

      - name: Install Frontend Dependencies
        working-directory: ./dashboard
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './dashboard'
          args: ${{ matrix.args }}
          tagName: app-v__VERSION__
          releaseName: 'TwoPixel Desktop v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
