<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="keywords" content="TwoPixel AI Agent" />
    <meta name="description" content="TwoPixel Dashboard" />
    <meta name="robots" content="noindex, nofollow" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    />
    <!-- VAD (Voice Activity Detection) Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
    <title>TwoPixel - 控制台</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.addEventListener('error', function(event) {
        const errorMsg = document.createElement('div');
        errorMsg.style.color = 'red';
        errorMsg.style.padding = '20px';
        errorMsg.style.fontFamily = 'monospace';
        errorMsg.style.zIndex = '9999';
        errorMsg.style.position = 'fixed';
        errorMsg.style.top = '0';
        errorMsg.style.background = 'white';
        errorMsg.innerText = 'App Error: ' + event.message + '\n' + event.filename + ':' + event.lineno;
        document.body.appendChild(errorMsg);
      });
      window.addEventListener('unhandledrejection', function(event) {
        const errorMsg = document.createElement('div');
        errorMsg.style.color = 'red';
        errorMsg.style.padding = '20px';
        errorMsg.style.fontFamily = 'monospace';
        errorMsg.style.zIndex = '9999';
        errorMsg.style.position = 'fixed';
        errorMsg.style.top = '50px';
        errorMsg.style.background = 'white';
        errorMsg.innerText = 'Promise Rejection: ' + (event.reason && event.reason.message ? event.reason.message : event.reason);
        document.body.appendChild(errorMsg);
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
